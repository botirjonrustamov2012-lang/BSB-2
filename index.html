<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Travel | Payme Integration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #0b1318; color: white; min-height: 100vh; overflow-x: hidden; scroll-behavior: smooth; }

        header { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            display: flex; align-items: center; padding: 0 5%; 
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); 
            z-index: 1000; border-bottom: 1px solid rgba(0, 198, 255, 0.3); 
        }

        .hero { 
            height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center; padding: 20px;
        }

        .section-title { text-align: center; margin: 40px 0 20px; font-size: 32px; color: #00ff88; text-transform: uppercase; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; padding: 20px 5%; }
        
        .card { 
            background: #16262e; border-radius: 20px; overflow: hidden; cursor: pointer; transition: 0.3s; position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .card:hover { transform: translateY(-10px); border-color: #00ff88; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        
        .card h3 { text-align: center; padding: 15px 5px; font-size: 20px; }
        .price-info { text-align: center; padding-bottom: 20px; color: #00ff88; font-weight: bold; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 2000; overflow-y: auto; padding: 20px; }
        .modal-content { background: #1a2a33; width: 100%; max-width: 600px; padding: 30px; border-radius: 25px; position: relative; border: 1px solid #00c6ff; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 14px; }
        table td { border: 1px solid rgba(255,255,255,0.05); padding: 10px; background: rgba(255,255,255,0.02); }

        .variant-btn { padding: 8px 18px; margin: 4px; border: none; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; cursor: pointer; }
        .variant-btn.active { background: #00c6ff; color: black; font-weight: bold; }

        .order-form { display: grid; gap: 10px; margin-top: 15px; }
        .order-form input, .order-form select { padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; }
        
        .pay-btn { padding: 15px; border: none; border-radius: 8px; background: #00ff88; color: black; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header><h1>Ultimate Travel</h1></header>

<section class="hero">
    <h2>Eksklyuziv Dam Olish</h2>
    <p>Endi to'lovlarni Payme orqali amalga oshirishingiz mumkin</p>
</section>

<h2 class="section-title">✈️ Davlatlar</h2>
<section id="tours" class="grid-container"></section>

<h2 class="section-title">🏨 Mehmonxonalar</h2>
<section id="hotels" class="grid-container"></section>

<div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
const tours = [
    { title: "🇹🇷 Turkiya", img: "https://images.unsplash.com/photo-1524231757912-21f4fe3a7200", prices: { VIP: 1500, Business: 900, Economy: 500 }, places: { VIP: ["Istanbul", "Kapadokiya", "Antalya", "Bodrum", "Pamukkale"], Business: ["Istanbul", "Antalya"], Economy: ["Istanbul"] } },
    { title: "🇯🇵 Yaponiya", img: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e", prices: { VIP: 2500, Business: 1600, Economy: 1100 }, places: { VIP: ["Tokio", "Kioto", "Osaka", "Fudzi", "Nara"], Business: ["Tokio", "Kioto"], Economy: ["Tokio"] } },
    { title: "🇦🇪 Dubay", img: "https://images.unsplash.com/photo-1512453979798-5ea266f8880c", prices: { VIP: 2200, Business: 1400, Economy: 850 }, places: { VIP: ["Burj Khalifa", "Palm Jumeirah", "Safari"], Business: ["Burj Khalifa"], Economy: ["Dubai Mall"] } },
    { title: "🇮🇹 Italiya", img: "https://images.unsplash.com/photo-1523906834658-6e24ef2386f9", prices: { VIP: 2800, Business: 1900, Economy: 1200 }, places: { VIP: ["Rim", "Venetsiya", "Florensiya"], Business: ["Rim"], Economy: ["Rim"] } },
    { title: "🇫🇷 Fransiya", img: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34", prices: { VIP: 3000, Business: 2000, Economy: 1300 }, places: { VIP: ["Parij", "Versal", "Nitssa"], Business: ["Parij"], Economy: ["Parij"] } },
    { title: "🇮🇩 Bali", img: "https://images.unsplash.com/photo-1537996194471-e657df975ab4", prices: { VIP: 1900, Business: 1200, Economy: 750 }, places: { VIP: ["Ubud", "Uluwatu", "Nusa Penida"], Business: ["Ubud"], Economy: ["Kuta"] } },
    { title: "🇺🇸 AQSH", img: "https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9", prices: { VIP: 4500, Business: 3000, Economy: 1800 }, places: { VIP: ["Nyu-York", "Las-Vegas", "LA"], Business: ["Nyu-York"], Economy: ["Nyu-York"] } },
    { title: "🇪🇬 Misr", img: "https://images.unsplash.com/photo-1503177119275-0aa32b3a9368", prices: { VIP: 1400, Business: 850, Economy: 500 }, places: { VIP: ["Piramidalar", "Sharm", "Luksos"], Business: ["Piramidalar"], Economy: ["Piramidalar"] } },
    { title: "🇨🇭 Shveytsariya", img: "https://images.unsplash.com/photo-1530122037265-a5f1f91d3b99", prices: { VIP: 3800, Business: 2400, Economy: 1500 }, places: { VIP: ["Syurix", "Alplar", "Jeneva"], Business: ["Syurix"], Economy: ["Syurix"] } },
    { title: "🇲🇻 Maldiv", img: "https://images.unsplash.com/photo-1514282401047-d79a71a590e8", prices: { VIP: 4800, Business: 3200, Economy: 2000 }, places: { VIP: ["Private Island", "Underwater Rest."], Business: ["Resort"], Economy: ["Male"] } },
    { title: "🇰🇷 Koreya", img: "https://images.unsplash.com/photo-1517154421773-0529f29ea451", prices: { VIP: 2600, Business: 1700, Economy: 1000 }, places: { VIP: ["Seul", "Pusan", "Chedju"], Business: ["Seul"], Economy: ["Seul"] } }
];

const hotels = [
    { title: "Atlantis The Palm", img: "https://images.unsplash.com/photo-1566073771259-6a8506099945", prices: { VIP: 900, Business: 600, Economy: 300 }, services: { VIP: ["Underwater Suite", "Butler"], Business: ["Sea View Room"], Economy: ["Standard"] } },
    { title: "Marina Bay Sands", img: "https://images.unsplash.com/photo-1542314831-068cd1dbfeeb", prices: { VIP: 800, Business: 550, Economy: 280 }, services: { VIP: ["Infinity Pool", "Club Lounge"], Business: ["Pool Access"], Economy: ["Deluxe Room"] } },
    { title: "Burj Al Arab", img: "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b", prices: { VIP: 1500, Business: 950, Economy: 500 }, services: { VIP: ["Gold Interiors", "Private Beach"], Business: ["Luxury Suite"], Economy: ["Studio Room"] } },
    { title: "The Ritz-Carlton", img: "http://googleusercontent.com/image_collection/image_retrieval/9721050904422777493_0", prices: { VIP: 700, Business: 450, Economy: 220 }, services: { VIP: ["Presidential Suite", "Fine Dining"], Business: ["Exec Room"], Economy: ["Standard Room"] } },
    { title: "Four Seasons Bali", img: "https://images.unsplash.com/photo-1520250497591-112f2f40a3f4", prices: { VIP: 1100, Business: 700, Economy: 400 }, services: { VIP: ["Private Villa", "Infinity Pool"], Business: ["Garden Villa"], Economy: ["Hotel Room"] } }
];

function render() {
    const toursDiv = document.getElementById("tours");
    const hotelsDiv = document.getElementById("hotels");
    tours.forEach((t, i) => {
        toursDiv.innerHTML += `<div class="card" onclick="openMod(${i}, 'tour')"><img src="${t.img}"><h3>${t.title}</h3><div class="price-info">$${t.prices.VIP} dan</div></div>`;
    });
    hotels.forEach((h, i) => {
        hotelsDiv.innerHTML += `<div class="card" onclick="openMod(${i}, 'hotel')"><img src="${h.img}"><h3>${h.title}</h3><div class="price-info">$${h.prices.VIP} / kun</div></div>`;
    });
}

function openMod(idx, type) {
    const data = type === 'tour' ? tours[idx] : hotels[idx];
    const modal = document.getElementById("modal");
    document.getElementById("modalContent").innerHTML = `
        <span class="close" onclick="document.getElementById('modal').style.display='none'">✖</span>
        <h2 style="color:#00ff88;">${data.title}</h2>
        <table id="modTable"></table>
        <div style="margin: 10px 0;">
            <button class="variant-btn active" onclick="upd('${type}', ${idx}, 'VIP', this)">VIP</button>
            <button class="variant-btn" onclick="upd('${type}', ${idx}, 'Business', this)">Business</button>
            <button class="variant-btn" onclick="upd('${type}', ${idx}, 'Economy', this)">Economy</button>
        </div>
        <div class="order-form">
            <h4 id="modPrice" style="color:#00c6ff;">Narx: $${data.prices.VIP}</h4>
            <input id="uName" placeholder="Ismingiz">
            <input id="uPhone" placeholder="Telefoningiz">
            <select id="payMethod">
                <option value="payme">Payme orqali to'lov</option>
                <option value="telegram">Telegram orqali (Naqd)</option>
            </select>
            <button class="pay-btn" onclick="handleOrder('${data.title}')" id="ordBtn">Tasdiqlash va To'lash</button>
        </div>
    `;
    modal.style.display = "flex";
    upd(type, idx, 'VIP');
}

function upd(type, idx, klass, btn = null) {
    const data = type === 'tour' ? tours[idx] : hotels[idx];
    const list = type === 'tour' ? data.places[klass] : data.services[klass];
    if (btn) {
        document.querySelectorAll(".variant-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    }
    document.getElementById("modTable").innerHTML = list.map((item, i) => `<tr><td>${i+1}</td><td>${item}</td></tr>`).join("");
    document.getElementById("modPrice").innerText = `Narx: $${data.prices[klass]}`;
    document.getElementById("ordBtn").dataset.price = data.prices[klass];
}

function handleOrder(title) {
    const name = document.getElementById("uName").value;
    const phone = document.getElementById("uPhone").value;
    const price = document.getElementById("ordBtn").dataset.price;
    const method = document.getElementById("payMethod").value;

    if(!name || !phone) { alert("Ma'lumotlarni to'ldiring!"); return; }

    if(method === "payme") {
        // Payme Checkout URL (Namuna: Merchant ID va narx bilan)
        const paymeUrl = `https://checkout.paycom.uz/${btoa('m=640000000000;a=' + price * 12600 + '00')}`;
        window.open(paymeUrl, '_blank');
        alert("Payme to'lov sahifasiga o'tilmoqda...");
    } else {
        const msg = `⚡️ BUYURTMA%0A📍 Manzil: ${title}%0A💰 Narx: $${price}%0A👤 Mijoz: ${name}%0A📞 Tel: ${phone}`;
        window.open(`https://t.me/YOUR_USERNAME?text=${msg}`);
    }
}

render();
</script>
</body>
</html>
